services:
  ebook-enricher:
    build: .
    image: ebook-enricher:latest
    container_name: ebook-enricher
    restart: unless-stopped
    environment:
      - HARDCOVER_TOKEN=${HARDCOVER_TOKEN}
      - EBOOKS_PATH=/data/media/ebooks
      - LOG_LEVEL=INFO
    volumes:
      # Adjust source path to wherever your EPUB library lives on the host.
      - ./ebooks:/data/media/ebooks
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# To attach to an existing Docker network so siblings can reach
# `http://ebook-enricher:8000`, uncomment and set the network name:
#
#   networks:
#     my_stack_default:
#       external: true
#
# Then add `networks: [my_stack_default]` to the service.
